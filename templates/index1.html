<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahay AI | Your Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .orb {
            width: 150px; height: 150px; border-radius: 50%;
            background: linear-gradient(45deg, #4f46e5, #9333ea, #ec4899);
            filter: blur(30px); opacity: 0.5; transition: all 0.5s ease;
        }
        .orb-active { transform: scale(1.5); opacity: 0.8; filter: blur(20px); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1.2); } 50% { transform: scale(1.5); } 100% { transform: scale(1.2); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-900/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-900/20 blur-[120px]"></div>
    </div>

    <div class="glass p-10 rounded-[40px] w-[90%] max-w-md text-center flex flex-col items-center">
        <h1 class="text-2xl font-semibold tracking-tight mb-2">Sahay AI</h1>
        <p id="status" class="text-white/50 text-sm mb-12">Tap to speak with your assistant</p>

        <div id="orbContainer" class="relative flex items-center justify-center mb-12">
            <div id="voiceOrb" class="orb"></div>
            <button id="recordBtn" class="absolute inset-0 flex items-center justify-center text-5xl transition-transform active:scale-90">
                🎙️
            </button>
        </div>

        <audio id="audioPlayer" class="hidden"></audio>

        <div class="w-full bg-white/5 rounded-2xl p-4 text-xs text-white/30 italic">
            "How do I apply for an Aadhaar card?"
        </div>
    </div>

    <script>
        const btn = document.getElementById('recordBtn');
        const orb = document.getElementById('voiceOrb');
        const status = document.getElementById('status');
        const player = document.getElementById('audioPlayer');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    orb.classList.remove('orb-active');
                    status.innerText = "Processing through Sahay Pipeline...";

                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', blob, 'web_audio.wav');

                    try {
                        const response = await fetch('http://127.0.0.1:5000/process-web-voice', { 
                            method: 'POST', 
                            body: formData 
                        });

                        const audioBlob = await response.blob();
                        const url = URL.createObjectURL(audioBlob);
                        
                        player.src = url;
                        player.play();
                        status.innerText = "Sahay is responding...";
                    } catch (err) {
                        status.innerText = "Connection Error";
                    }
                };

                // Visual Start
                recorder.start();
                orb.classList.add('orb-active');
                status.innerText = "Sahay is listening...";

                // Auto-stop after 5 seconds
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 5000);

            } catch (err) {
                status.innerText = "Mic Permission Denied";
            }
        };
    </script>
</body>
</html>
