<!DOCTYPE html>
<html>
<body>
    <h1>Sahay AI Web Demo</h1>
    <button id="recordBtn">Press to Speak</button>
    <p id="status">Status: Ready</p>
    <audio id="audioPlayer" controls style="display:none;"></audio>

    <script>
        let btn = document.getElementById('recordBtn');
        let status = document.getElementById('status');
        
        btn.onclick = async () => {
            let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            let recorder = new MediaRecorder(stream);
            let chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                status.innerText = "Status: Processing Pipeline...";
                let blob = new Blob(chunks, { type: 'audio/wav' });
                let formData = new FormData();
                formData.append('audio', blob);

                let response = await fetch('/process-web-voice', { method: 'POST', body: formData });
                let audioBlob = await response.blob();
                let url = URL.createObjectURL(audioBlob);
                
                let player = document.getElementById('audioPlayer');
                player.src = url;
                player.style.display = 'block';
                player.play();
                status.innerText = "Status: Playing Response";
            };

            recorder.start();
            status.innerText = "Status: Recording...";
            setTimeout(() => recorder.stop(), 6000); // Records for 4 seconds
        };
    </script>
</body>
</html>
